<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio player</title>
  <link rel="icon" type="image/x-icon" href="./assets/img/favicon-96x96.png">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
  <section class="container">
    <div class="title">
      <h1 class="song-name"></h1>
      <h2 class="song-author"></h2>
    </div>
    <div class="cover"></div>
    <div class="controls controls--main">
      <button class="prev btn">
        <svg class="icon">
          <use xlink:href="./assets/img/sprite.svg#prev-icon"></use>
        </svg>
      </button>
      <button class="play btn" data-playing="false" role="switch" aria-checked="false">
        <svg class="play-icon icon">
          <use xlink:href="./assets/img/sprite.svg#play-icon"></use>
        </svg>
        <svg class="pause-icon icon icon--hide">
          <use xlink:href="./assets/img/sprite.svg#pause-icon"></use>
        </svg>
      </button>
      <button class="next btn">
        <svg class="icon">
          <use xlink:href="./assets/img/sprite.svg#next-icon"></use>
        </svg>
      </button>
    </div>

    <div class="progress-bar__container">
      <span class="progress-bar__content"></span>
    </div>
    <div class="duration">
      <span class="duration__current">0:00</span><span class="separator">|</span><span class="duration__full">-</span>
    </div>
    <div class="controls controls--sub">
      <button class="shuffle btn" type="button">
        <svg class="icon">
          <use xlink:href="./assets/img/sprite.svg#shuffle-icon"></use>
        </svg>
      </button>
      <button class="repeat btn" data-repeating="false" role="switch" aria-checked="false">
        <svg class="icon">
          <use xlink:href="./assets/img/sprite.svg#repeat-icon"></use>
        </svg>
      </button>
      <button type="button" class="volume-toggle btn" />
      <div class="volume__container">
        <label for="show-volume">
          <svg class="icon">
            <use xlink:href="./assets/img/sprite.svg#volume-icon"></use>
          </svg>
        </label>
        <input type="range" class="volume btn" min="0" max="2" value="1" step="0.01">
      </div>
    </div>
    <audio preload="metadata">
    </audio>
  </section>
  <script src="./index.js"></script>
</body>

</html>
